name: Monthly Prophet Forecast

on:
  schedule:
    # Runs at 00:00 on the 1st and 15th of every month (Fortnightly)
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'
          cache: 'pip' # Speeds up future runs

      - name: Install Dependencies
        run: |
          pip install notebook papermill pandas prophet yfinance matplotlib
          # Add any other libraries used in your notebook here

      - name: Execute Notebook
        run: |
          papermill prophet.ipynb prophet_output.ipynb

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add prophet_output.ipynb
          git commit -m "Automated Forecast Update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push